<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap"
      rel="stylesheet"
    />
    <title>Productlist</title>
  </head>
  <body>
    <header><a href="index.html">Forside</a></header>

    <main>
      <div class="produkt">
        <div class="produkt_billed">
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1535.webp"
            alt="kasket med puma logo"
          />
        </div>
        <div class="produkt_text">
          <div class="produkt_type">
            <h3>PUMA</h3>
            <h2>Kasket - sort</h2>
          </div>
          <div class="produkt_pris">
            <p>339 DKK</p>
          </div>
        </div>
        <div class="bestil">
          <p class="lager_status">På lager online</p>
          <button class="add_cart">Tilføj til kurv</button>
        </div>
      </div>
    </main>

    <footer></footer>
  </body>
</html>
